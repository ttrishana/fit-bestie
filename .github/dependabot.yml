version: 2

updates:
  # npm dependencies 
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 3
    commit-message:
      prefix: "deps"
    labels:
      - "dependencies"

  # GitHub Actions 
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
